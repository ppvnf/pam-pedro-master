saml-idp-metadata-url: $saml_idp_metadata_url
saml-entity-id: $saml_entity_id
saml-callback-url: $saml_callback_url
saml-strict: $saml_strict

guacd-hostname: localhost
guacd-port: 4822

postgresql-hostname: localhost
postgresql-port: 5432
postgresql-database: $PGDATABASE
postgresql-username: $POSTGRES_USER
postgresql-password: $POSTGRES_PASSWORD
postgresql-auto-create-accounts: true

postgresql-user-password-min-length: 20
postgresql-user-password-require-multiple-case: false
postgresql-user-password-require-digit: false
postgresql-user-password-require-symbol: false
postgresql-user-password-prohibit-username: false
postgresql-user-password-max-age: 0
postgresql-user-password-min-age: 0
postgresql-user-password-history-size: 0

extension-priority: *, saml